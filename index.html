<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GIOW Downloader</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>GIOW Downloader</h1>
      <p>Cole o link de um vídeo do YouTube, Instagram ou outra rede social</p>
    </header>

    <div class="search-box">
      <input
        type="text"
        id="url"
        placeholder="https://www.youtube.com/watch?v=..."
        autocomplete="off"
        spellcheck="false"
      />
      <button id="analyzeBtn">Analisar</button>
    </div>

    <div id="result"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
